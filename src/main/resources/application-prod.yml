spring:
  datasource:
    url: jdbc:mysql://prod-db:3306/booknexus?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 10
      min-idle: 10
      max-active: 50
      max-wait: 30000
      stat-view-servlet:
        enabled: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
      database: 0
      password: ${REDIS_PASSWORD}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 32
          max-idle: 16
          min-idle: 8

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: 5672
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: /
    listener:
      simple:
        concurrency: 5
        max-concurrency: 20
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms
        prefetch: 1

  elasticsearch:
    uris: ${ES_URIS}
    connection-timeout: 5s
    socket-timeout: 60s

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  level:
    com.zjw.booknexus: info

minio:
  endpoint: ${MINIO_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: booknexus

xxl:
  job:
    admin-addresses: ${XXL_JOB_ADMIN}
