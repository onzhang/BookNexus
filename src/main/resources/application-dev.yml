spring:
  datasource:
    url: jdbc:mysql://localhost:3306/booknexus?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin
      filter:
        stat:
          enabled: true
          slow-sql-millis: 2000
          log-slow-sql: true
        wall:
          enabled: true

  data:
    redis:
      host: 192.168.100.128
      port: 6379
#      password: 123456
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

  rabbitmq:
    host: 192.168.100.128
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        concurrency: 3
        max-concurrency: 10
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms
        prefetch: 1

  elasticsearch:
    uris: http://192.168.100.128:9200
    connection-timeout: 5s
    socket-timeout: 30s

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.zjw.booknexus: debug

minio:
  endpoint: http://192.168.100.128:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: booknexus
